<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Ink. House</title>
  </head>
  <body>
    <header class="header">
      <a href="/" class="header-logo">
        <img
          class="header-logo-images"
          src="/icons/Logo.svg"
          alt="Logo"
          width="145"
          height="35"
        />
      </a>
      <nav class="header-menu">
        <ul class="header-menu-list">
          <li class="header-menu-item">
            <a href="/" class="header-menu-link">Репродукции</a>
          </li>
          <li class="header-menu-item">
            <a href="/" class="header-menu-link">Новинки</a>
          </li>
          <li class="header-menu-item">
            <a href="/" class="header-menu-link">О нас</a>
          </li>
          <li class="header-menu-item">
            <a href="/" class="header-menu-link"
              ><img
                class="basket"
                src="/images/basket.svg"
                alt="Корзина"
                width="24"
                height="24"
            /></a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="content">
      <section class="hero">
        <div class="hero-items container">
          <img
            class="hero-img"
            src="/images/hero-bird.png"
            alt="bird"
            class="hero-image"
            width="540"
            height="621"
            loading="lazy"
          />
          <div class="hero-card-bird">
            <h1 class="hero-block-title">Реплики картин от</h1>
            <div class="hero-block-description">
              <p>
                Высокое качество отрисовки на плотной бумаге или льняном холсте.
                Редкие произведения, доступные цены.
              </p>
            </div>
            <button class="hero-block-button button">Продукция</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
